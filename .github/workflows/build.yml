name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK inside Kivy Docker container
        run: |
          docker run --rm \
            --entrypoint bash \
            -v ${{ github.workspace }}:/home/user/workspace \
            -w /home/user/workspace \
            ghcr.io/kivy/buildozer:latest \
            -c "yes | buildozer android debug 2>&1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: temple-run
          path: ./bin/*.apk
          if-no-files-found: error
