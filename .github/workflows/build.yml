name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: temple-run
          path: ${{ steps.buildozer.outputs.filename }}
